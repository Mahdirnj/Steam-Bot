# ──────────────────────────────────────────────────────────────────────────────
# Steam Deal Telegram Bot — docker-compose.yml
# Usage:  docker compose up -d --build
# Logs:   docker compose logs -f bot
# Stop:   docker compose down
# ──────────────────────────────────────────────────────────────────────────────

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steam-deal-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/bot.db
      - LOG_LEVEL=INFO
    volumes:
      # Persist the SQLite database across container restarts.
      - bot-data:/app/data
      # Persist logs so they survive container restarts.
      - bot-logs:/app/logs

volumes:
  bot-data:
    driver: local
  bot-logs:
    driver: local
